{% extends 'base.html' %}
{% block title %}Acceso de invitados{% endblock %}

{% block content %}
<section class="auth-section">
  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-ornament">✦</div>
      <h1>Acceso de invitados</h1>
      <p>Selecciona tu nombre de la lista y elige una contraseña para acceder.<br>
         Si es tu primera vez, tu acceso se creará automáticamente.</p>
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form">

      <div class="form-group">
        <label for="guest_id">Tu nombre</label>
        <div class="select-wrapper">
          <select id="guest_id" name="guest_id" required autofocus>
            <option value="" disabled selected>Selecciona tu nombre…</option>
            {% for guest in guests %}
            <option value="{{ guest.id }}">
              {{ guest.name }}{% if guest.max_plus_ones > 0 %} (+ {{ guest.max_plus_ones }}){% endif %}
            </option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="password-wrapper">
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Elige una contraseña"
            autocomplete="current-password"
            required
          >
          <button type="button" class="password-toggle" aria-label="Mostrar contraseña" data-target="password">
            <svg class="eye-icon eye-open" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
            <svg class="eye-icon eye-closed" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" style="display:none">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary btn-full">Entrar</button>
    </form>
  </div>
</section>
{% endblock %}
